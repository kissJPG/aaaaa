pluginManagement {
    def flutterSdkPath = settings.ext.findProperty('flutterSdkPath')
                         ?: (settings.ext.hasProperty('flutterSdkPath') ? null : null)
    if (flutterSdkPath == null) {
        def properties = new Properties()
        def localPropsFile = file("local.properties")
        if (localPropsFile.exists()) {
            localPropsFile.withInputStream { properties.load(it) }
            flutterSdkPath = properties.getProperty("flutter.sdk")
        }
        if (flutterSdkPath == null) {
            flutterSdkPath = System.getenv("FLUTTER_ROOT")
        }
        if (flutterSdkPath == null) {
            throw new GradleException("Flutter SDK not found. Set 'flutter.sdk' in local.properties or FLUTTER_ROOT env.")
        }
        settings.ext.flutterSdkPath = flutterSdkPath
    }

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

include ":app"
